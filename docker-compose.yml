services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jurishaven-server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - jurishaven-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: jurishaven-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - ./client/.env.local
    depends_on:
      - server
    networks:
      - jurishaven-network

  meilisearch:
    image: getmeili/meilisearch:v1.7.3
    container_name: jurishaven-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=local_master_key_12345
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    restart: always
    networks:
      - jurishaven-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jurishaven-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - jurishaven-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jurishaven-network:
    driver: bridge

volumes:
  meili_data:
  redis_data:
